events {
  worker_connections 1024;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile     on;

  # ── Redirect HTTP → HTTPS ─────────────────────────────────
  server {
    listen 80;
    server_name grafana.rerktserver.com;

    # ACME challenge — needed for cert renewal
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── Grafana — grafana.rerktserver.com ─────────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name grafana.rerktserver.com;

    ssl_certificate     /etc/letsencrypt/live/grafana.rerktserver.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.rerktserver.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # IP restriction — home IP only (SG also enforces this at network level)
    allow REDACTED_IP;
    deny all;

    location / {
      proxy_pass         http://grafana:3000;   # Direct container-to-container via compose network
      proxy_http_version 1.1;
      proxy_buffering    off;                   # Required for Grafana live streaming
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";  # WebSocket support
      proxy_read_timeout 60s;
      proxy_connect_timeout 5s;
    }
  }
}
