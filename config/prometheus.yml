global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Host metrics — CPU, memory, disk, network via Node Exporter
  - job_name: 'node'
    static_configs:
      - targets: ['PORTFOLIO_EIP:9100']
        labels:
          instance: 'rerktserver.com'
          env: 'production'

  # Container metrics — per-container CPU/memory/restarts via cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['PORTFOLIO_EIP:8080']
        labels:
          instance: 'rerktserver.com'
          env: 'production'
