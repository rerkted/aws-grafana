server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push   # loki resolves via compose network

scrape_configs:
  # Scrapes all containers running on this (Grafana) EC2 via Docker socket
  # Portfolio EC2 logs come in via the portfolio EC2's Promtail instance pushing directly to Loki :3100
  - job_name: grafana-ec2-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      - source_labels: [__meta_docker_container_image]
        target_label: image
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # Drop containers with no name
      - source_labels: [container]
        regex: (.+)
        action: keep
    pipeline_stages:
      - docker: {}
