name: Deploy Grafana Stack

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
  SSM_INSTANCE_PARAM: /rerktserver/grafana/instance-id

jobs:
  # ── STAGE 1: Security Scans ───────────────────────────────────
  security:
    name: "Stage 1 — Security"
    uses: rerkted/devsecops-pipeline/.github/workflows/security.yml@main
    with:
      terraform-dir: terraform
      node-dirs: '.'
      language: javascript
      severity-threshold: HIGH
    permissions:
      security-events: write
      actions: read
      contents: read

  # ── STAGE 2: Deploy ───────────────────────────────────────────
  deploy:
    name: "Stage 2 — Deploy"
    runs-on: ubuntu-latest
    needs: security
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        timeout-minutes: 15
        run: |
          INSTANCE_ID=$(aws ssm get-parameter \
            --name "${{ env.SSM_INSTANCE_PARAM }}" \
            --query "Parameter.Value" \
            --output text)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters commands="[
              \"set -euo pipefail\",

              \"# ── Ensure docker compose plugin is installed\",
              \"if ! docker compose version &>/dev/null 2>&1; then mkdir -p /usr/local/lib/docker/cli-plugins && curl -SL https://github.com/docker/compose/releases/download/v2.35.1/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose && chmod +x /usr/local/lib/docker/cli-plugins/docker-compose; fi\",

              \"# ── Clone or update repo\",
              \"if [ -d /home/ec2-user/aws-grafana/.git ]; then cd /home/ec2-user/aws-grafana && git fetch origin && git reset --hard origin/main; else rm -rf /home/ec2-user/aws-grafana && git clone https://github.com/rerkted/aws-grafana.git /home/ec2-user/aws-grafana; fi\",

              \"cd /home/ec2-user/aws-grafana\",

              \"# ── Write env file with credentials\",
              \"printf 'GRAFANA_USER=%s\\nGRAFANA_PASSWORD=%s\\n' '${{ secrets.GRAFANA_USER }}' '${{ secrets.GRAFANA_PASSWORD }}' > .env\",
              \"chmod 640 .env\",
              \"chown ec2-user:ec2-user .env\",

              \"# ── Pull images and start stack\",
              \"docker compose pull\",
              \"docker compose up -d --remove-orphans\",

              \"sleep 10\",
              \"docker compose ps\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            echo "[$i/60] Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deployment successful"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
          done

          echo "Polling timed out"
          exit 1

  # ── STAGE 3: Verify ───────────────────────────────────────────
  verify:
    name: "Stage 3 — Verify"
    needs: deploy
    uses: rerkted/devsecops-pipeline/.github/workflows/verify.yml@main
    with:
      ssm-instance-param: /rerktserver/grafana/instance-id
      compose-dir: /home/ec2-user/aws-grafana
      aws-region: us-east-1
    secrets:
      role-arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
    permissions:
      id-token: write
      contents: read

  # ── STAGE 4: Cleanup ──────────────────────────────────────────
  cleanup:
    name: "Stage 4 — Cleanup"
    needs: verify
    uses: rerkted/devsecops-pipeline/.github/workflows/cleanup.yml@main
    with:
      ssm-instance-param: /rerktserver/grafana/instance-id
      aws-region: us-east-1
    secrets:
      role-arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
    permissions:
      id-token: write
      contents: read

  # ── STAGE 5: Done ─────────────────────────────────────────────
  done:
    name: "Stage 5 — Done"
    needs: [security, deploy, verify, cleanup]
    if: always()
    uses: rerkted/devsecops-pipeline/.github/workflows/done.yml@main
    with:
      security-result: ${{ needs.security.result }}
      deploy-result: ${{ needs.deploy.result }}
      verify-result: ${{ needs.verify.result }}
      cleanup-result: ${{ needs.cleanup.result }}
      service-name: Grafana Stack
      service-url: https://grafana.rerktserver.com
    permissions:
      contents: read
